<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0e5a8a">
    <meta name="description" content="Find the nearest shelter in Israel">
    <title>Miklat - Shelter Finder</title>

    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/icon.svg">

    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    >
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <div id="map" role="application" aria-label="Shelter map"></div>

    <h1 class="sr-only" data-i18n="app_name">Shelter Finder</h1>

    <button id="language-toggle" class="floating-icon language-toggle" type="button" aria-haspopup="dialog" aria-expanded="false">
      <span class="sr-only" data-i18n="language">Language</span>
      <svg class="language-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm7.9 9h-3.1a15.1 15.1 0 0 0-1.5-5A8.03 8.03 0 0 1 19.9 11ZM12 4c1 .9 2.2 3.4 2.7 7H9.3C9.8 7.4 11 4.9 12 4ZM4.1 13h3.1a15.1 15.1 0 0 0 1.5 5A8.03 8.03 0 0 1 4.1 13Zm3.1-2H4.1A8.03 8.03 0 0 1 8.7 6a15.1 15.1 0 0 0-1.5 5Zm1.9 0c.6-4.3 2.2-7 2.9-7s2.3 2.7 2.9 7H9.1Zm0 2h5.8c-.6 4.3-2.2 7-2.9 7s-2.3-2.7-2.9-7Zm6.2 5a15.1 15.1 0 0 0 1.5-5h3.1a8.03 8.03 0 0 1-4.6 5Z"
        />
      </svg>
    </button>

    <button id="install-help-toggle" class="floating-icon install-help-toggle" type="button" aria-haspopup="dialog" aria-expanded="false">
      <span class="sr-only" data-i18n="install_help">Add to home screen help</span>
      <svg class="install-help-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm1 15h-2v-2h2v2Zm0-4h-2V7h2v6Z" />
      </svg>
    </button>

    <div id="language-modal" class="language-popover" role="dialog" aria-modal="false" aria-labelledby="language-modal-title" hidden>
      <div class="language-popover-card">
        <h2 id="language-modal-title" class="language-popover-title" data-i18n="choose_language">Choose language</h2>
        <div class="language-options" role="listbox" aria-label="Language options">
          <button type="button" class="language-option" data-lang-option="en">English</button>
          <button type="button" class="language-option" data-lang-option="he">עברית</button>
          <button type="button" class="language-option" data-lang-option="ru">Русский</button>
          <button type="button" class="language-option" data-lang-option="fr">Français</button>
          <button type="button" class="language-option" data-lang-option="ar">العربية</button>
        </div>
      </div>
    </div>

    <div id="install-help-popover" class="install-help-popover" role="dialog" aria-modal="false" aria-labelledby="install-help-title" hidden>
      <div class="install-help-popover-card">
        <h2 id="install-help-title" class="install-help-title" data-i18n="install_help_title">Add to home screen</h2>
        <p id="install-help-intro" class="install-help-intro"></p>
        <ol id="install-help-steps" class="install-help-steps"></ol>
        <a id="install-help-switch" class="install-help-switch" href="#"></a>
      </div>
    </div>

    <div id="offline-indicator" class="offline-indicator" aria-live="polite" hidden>
      <span data-i18n="offline">You are offline</span>
    </div>

    <div id="status-message" class="status-message" role="status" aria-live="polite" hidden></div>

    <button id="find-nearest-btn" class="find-nearest-btn" type="button" data-i18n="find_nearest">
      Find Nearest Shelter
    </button>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
